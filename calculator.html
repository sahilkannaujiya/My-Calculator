<!doctype html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/Calculator.css" />
  </head>
  <body>
    <div class="calculator">
        <div class="header">My Calculator</div>
      <div class="js-score">0.00</div>
      <div class="calculation-grid">
        <button
          onclick="
            updateCalculation('1');
            resultRender();
          "
          class="numbers"
        >
          1
        </button>
        <button
          onclick="
            updateCalculation('2');
            resultRender();
          "
          class="numbers"
        >
          2
        </button>
        <button
          onclick="
            updateCalculation('3');
            resultRender();
          "
          class="numbers"
        >
          3
        </button>
        <button
          onclick="
            updateCalculation('+');
            resultRender();
            console.log(calculation);
          "
          class="operators"
        >
          +
        </button>
        <button
          onclick="
            updateCalculation('4');
            resultRender();
          "
          class="numbers"
        >
          4
        </button>
        <button
          onclick="
            updateCalculation('5');
            resultRender();
          "
          class="numbers"
        >
          5
        </button>
        <button
          onclick="
            updateCalculation('6');
            resultRender();
          "
          class="numbers"
        >
          6
        </button>
        <button
          onclick="
            updateCalculation('-');
            resultRender();
            console.log(calculation);
          "
          class="operators"
        >
          -
        </button>
        <button
          onclick="
            updateCalculation('7');
            resultRender();
          "
          class="numbers"
        >
          7
        </button>
        <button
          onclick="
            updateCalculation('8');
            resultRender();
          "
          class="numbers"
        >
          8
        </button>
        <button
          onclick="
            updateCalculation('9');
            resultRender();
          "
          class="numbers"
        >
          9
        </button>
        <button
          onclick="
            updateCalculation('*');
            resultRender();
            console.log(calculation);
          "
          class="operators"
        >
          *
        </button>
        <button
          onclick="
            updateCalculation('0');
            resultRender();
          "
          class="numbers"
        >
          0
        </button>
        <button
          onclick="
            updateCalculation('.');
            resultRender();
          "
          class="numbers"
        >
          .
        </button>
        <button
          onclick="
            calculation = eval(calculation);
            resultRender();
          "
          class="numbers"
        >
          =
        </button>
        <button
          onclick="
            updateCalculation('/');
            resultRender();
          "
          class="operators"
        >
          /
        </button>

        <button
          onclick="
            calculation = '';
            updateCalculation('');
            resultRender();
          "
          class="numbers"
        >
          Clear
        </button>
      </div>

      <script src="scripts/Calculator.js"></script>
    </div>
  </body>
</html>
